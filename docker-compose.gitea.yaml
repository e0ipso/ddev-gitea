#ddev-generated
# Mount the host's tea CLI configuration into the web container so that `tea`
# inside the container shares the same Gitea server logins and credentials
# as the host user's tea installation.
# The pre-start hook in config.gitea.yaml ensures the host path exists
# as the correct type (file vs. directory) before Docker attempts to bind-mount it.
services:
  web:
    volumes:
      - "${HOME}/.config/tea/config.yml:${HOME}/.config/tea/config.yml"
